    # ====================
    # METRICS
    # ====================
    metrics:
      - name: total_billed_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.billed_amount)
        description: Total charges submitted across all claims
        ai_context:
          synonyms:
            - "total charges"
            - "gross charges"
            - "submitted amount"

      - name: total_allowed_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.allowed_amount)
        description: Total allowed amount after contractual adjustments
        ai_context:
          synonyms:
            - "total allowable"
            - "contracted amount"

      - name: total_paid_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.paid_amount)
        description: Total amount paid to providers
        ai_context:
          synonyms:
            - "total payments"
            - "reimbursement"
            - "plan paid"

      - name: total_member_liability
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.member_liability_amount)
        description: Total member out-of-pocket costs
        ai_context:
          synonyms:
            - "member cost share"
            - "OOP"
            - "patient responsibility"

      - name: claim_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT medical_claim_header.claim_id)
        description: Number of unique claims
        ai_context:
          synonyms:
            - "number of claims"
            - "claim volume"

      - name: line_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of claim lines
        ai_context:
          synonyms:
            - "service count"
            - "line volume"

      - name: unique_member_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(DISTINCT medical_claim_header.member_id)
        description: Number of unique members with claims
        ai_context:
          synonyms:
            - "patient count"
            - "member count"
            - "unique patients"

      - name: average_claim_amount
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.paid_amount) / NULLIF(COUNT(DISTINCT medical_claim_header.claim_id), 0)
        description: Average paid amount per claim
        ai_context:
          synonyms:
            - "avg claim cost"
            - "mean claim amount"

      - name: pmpm_cost
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.paid_amount) / NULLIF(COUNT(DISTINCT medical_claim_header.member_id), 0)
        description: Per member per month cost (requires monthly aggregation)
        ai_context:
          synonyms:
            - "PMPM"
            - "per member cost"
            - "member month cost"

      - name: average_length_of_stay
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(DATEDIFF(day, medical_claim_header.admission_date, medical_claim_header.discharge_date))
            - dialect: SNOWFLAKE
              expression: AVG(DATEDIFF('day', medical_claim_header.admission_date, medical_claim_header.discharge_date))
        description: Average length of stay for inpatient claims
        ai_context:
          synonyms:
            - "ALOS"
            - "avg LOS"
            - "average days"

      - name: utilization_per_1000
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: (COUNT(DISTINCT medical_claim_header.claim_id) * 1000.0) / NULLIF(COUNT(DISTINCT medical_claim_header.member_id), 0)
        description: Claims per 1000 members (utilization rate)
        ai_context:
          synonyms:
            - "utilization rate"
            - "claims per 1000"

      - name: denial_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: |
                COUNT(CASE WHEN medical_claim_header.claim_status_code = 'DENIED' THEN 1 END) * 100.0 / 
                NULLIF(COUNT(DISTINCT medical_claim_header.claim_id), 0)
        description: Percentage of claims denied
        ai_context:
          synonyms:
            - "denial percentage"
            - "reject rate"

      - name: payment_ratio
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_header.paid_amount) / NULLIF(SUM(medical_claim_header.billed_amount), 0)
        description: Ratio of paid to billed amount (payment yield)
        ai_context:
          synonyms:
            - "payment yield"
            - "paid to billed ratio"
            - "reimbursement ratio"

      - name: contractual_adjustment_rate
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: (SUM(medical_claim_header.billed_amount) - SUM(medical_claim_header.allowed_amount)) / NULLIF(SUM(medical_claim_header.billed_amount), 0)
        description: Percentage of charges written off due to contractual adjustments
        ai_context:
          synonyms:
            - "discount rate"
            - "contractual write-off"

      - name: total_units
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_line.units)
        description: Total service units across all claim lines
        ai_context:
          synonyms:
            - "service units"
            - "unit count"

      - name: cost_per_unit
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(medical_claim_line.line_paid_amount) / NULLIF(SUM(medical_claim_line.units), 0)
        description: Average cost per service unit
        ai_context:
          synonyms:
            - "unit cost"
            - "cost per service"

