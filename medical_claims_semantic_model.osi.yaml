# yaml-language-server: $schema=https://raw.githubusercontent.com/open-semantic-interchange/OSI/main/core-spec/osi-schema.json

# Medical Claims Domain Semantic Model
# OSI-compliant semantic model for healthcare claims analytics
# Covers: Medical Claim Headers, Claim Lines, Code Sets (ICD, CPT, Revenue, Place of Service), Member Demographics

version: "1.0"

semantic_model:
  - name: medical_claims_analytics
    description: Healthcare Medical Claims semantic model for claims processing, utilization analysis, cost management, and population health analytics
    ai_context:
      instructions: "Use this semantic model for medical claims analytics in healthcare. It provides comprehensive claim header and line-level data with dimensional lookups for diagnosis codes (ICD-10), procedure codes (CPT/HCPCS), revenue codes, place of service, and member demographics. Supports analysis of claim costs, utilization patterns, provider performance, member health outcomes, and payment trends."

    datasets:
      # ====================
      # FACT TABLE: Medical Claim Header
      # ====================
      - name: medical_claim_header
        source: claims_db.medical.claim_header
        primary_key: [claim_id]
        unique_keys:
          - [claim_id]
        description: Fact table containing medical claim header information including submission details, dates, totals, and claim-level attributes
        ai_context:
          synonyms:
            - "claims"
            - "medical claims"
            - "healthcare claims"
            - "insurance claims"
            - "claim submissions"

        fields:
          - name: claim_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: claim_id
                - dialect: SNOWFLAKE
                  expression: claim_id
            description: Unique identifier for the medical claim
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "claim number"
                - "claim identifier"
                - "ICN"
                - "internal control number"

          - name: member_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: member_id
            description: Foreign key to member demographics
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "patient"
                - "subscriber"
                - "enrollee"
                - "insured"

          - name: provider_npi
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: provider_npi
            description: National Provider Identifier for the billing provider
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "provider"
                - "billing provider"
                - "NPI"
                - "provider ID"

          - name: rendering_provider_npi
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: rendering_provider_npi
            description: NPI of the rendering/servicing provider
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "servicing provider"
                - "treating physician"

          - name: facility_npi
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: facility_npi
            description: NPI of the facility where services were rendered
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "facility"
                - "service location"
                - "hospital"

          - name: claim_type_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: claim_type_code
            description: Type of claim (Professional/Institutional/Dental)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "claim type"
                - "form type"
                - "CMS-1500"
                - "UB-04"

          - name: claim_status_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: claim_status_code
            description: Current status of the claim (Paid/Denied/Pending/Adjusted)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "claim status"
                - "payment status"
                - "adjudication status"

          - name: service_date_from
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: service_date_from
            description: Start date of service for the claim
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "date of service"
                - "DOS"
                - "service start date"
                - "from date"

          - name: service_date_to
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: service_date_to
            description: End date of service for the claim
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "service end date"
                - "to date"
                - "through date"

          - name: admission_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: admission_date
            description: Admission date for institutional claims
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "admit date"
                - "inpatient admission"

          - name: discharge_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: discharge_date
            description: Discharge date for institutional claims
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "discharge"
                - "inpatient discharge"

          - name: received_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: received_date
            description: Date claim was received by payer
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "claim receipt date"
                - "submission date"

          - name: paid_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: paid_date
            description: Date claim was adjudicated and paid
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "payment date"
                - "adjudication date"
                - "finalized date"

          - name: place_of_service_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: place_of_service_code
            description: Foreign key to place of service dimension
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "POS"
                - "service location type"
                - "facility type"

          - name: bill_type_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: bill_type_code
            description: UB-04 bill type code for institutional claims
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "bill type"
                - "type of bill"
                - "TOB"

          - name: drg_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: drg_code
            description: Diagnosis Related Group code for inpatient claims
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "DRG"
                - "MS-DRG"
                - "APR-DRG"
                - "diagnosis related group"

          - name: principal_diagnosis_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: principal_diagnosis_code
            description: Primary/Principal ICD-10 diagnosis code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "primary diagnosis"
                - "principal dx"
                - "admitting diagnosis"

          - name: admitting_diagnosis_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: admitting_diagnosis_code
            description: Admitting diagnosis code for institutional claims
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "admitting dx"
                - "admit diagnosis"

          - name: billed_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: billed_amount
            description: Total amount billed on the claim
            ai_context:
              synonyms:
                - "charges"
                - "submitted charges"
                - "gross charges"
                - "total charges"

          - name: allowed_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: allowed_amount
            description: Total allowed amount after contractual adjustments
            ai_context:
              synonyms:
                - "allowable"
                - "contracted amount"
                - "negotiated rate"

          - name: paid_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: paid_amount
            description: Total amount paid by the payer
            ai_context:
              synonyms:
                - "payment"
                - "reimbursement"
                - "plan paid"
                - "net payment"

          - name: member_liability_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: member_liability_amount
            description: Member's total out-of-pocket responsibility
            ai_context:
              synonyms:
                - "patient responsibility"
                - "member cost share"
                - "OOP"

          - name: copay_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: copay_amount
            description: Copayment amount owed by member
            ai_context:
              synonyms:
                - "copay"
                - "co-payment"

          - name: coinsurance_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: coinsurance_amount
            description: Coinsurance amount owed by member
            ai_context:
              synonyms:
                - "coinsurance"
                - "member coinsurance"

          - name: deductible_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: deductible_amount
            description: Deductible amount applied to claim
            ai_context:
              synonyms:
                - "deductible"
                - "member deductible"

          - name: cob_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: cob_amount
            description: Coordination of Benefits amount from other payers
            ai_context:
              synonyms:
                - "COB"
                - "other payer amount"
                - "coordination of benefits"

          - name: length_of_stay
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: DATEDIFF(day, admission_date, discharge_date)
                - dialect: SNOWFLAKE
                  expression: DATEDIFF('day', admission_date, discharge_date)
            description: Number of days for inpatient stay
            ai_context:
              synonyms:
                - "LOS"
                - "days"
                - "inpatient days"

      # ====================
      # FACT TABLE: Medical Claim Line
      # ====================
      - name: medical_claim_line
        source: claims_db.medical.claim_line
        primary_key: [claim_id, line_number]
        unique_keys:
          - [claim_id, line_number]
        description: Fact table containing claim line-level detail including service codes, quantities, and line amounts
        ai_context:
          synonyms:
            - "claim lines"
            - "service lines"
            - "line items"
            - "claim details"

        fields:
          - name: claim_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: claim_id
            description: Foreign key to claim header
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "claim number"

          - name: line_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_number
            description: Sequential line number within the claim
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "service line number"
                - "line sequence"

          - name: procedure_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: procedure_code
            description: CPT or HCPCS procedure code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "CPT code"
                - "HCPCS code"
                - "service code"
                - "procedure"

          - name: procedure_modifier_1
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: procedure_modifier_1
            description: First procedure code modifier
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "modifier"
                - "CPT modifier"

          - name: procedure_modifier_2
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: procedure_modifier_2
            description: Second procedure code modifier
            dimension:
              is_time: false

          - name: revenue_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: revenue_code
            description: UB-04 revenue code for institutional claims
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "rev code"
                - "UB revenue code"

          - name: diagnosis_code_1
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: diagnosis_code_1
            description: Primary diagnosis code for the line
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "line diagnosis"
                - "dx pointer 1"

          - name: diagnosis_code_2
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: diagnosis_code_2
            description: Secondary diagnosis code for the line
            dimension:
              is_time: false

          - name: diagnosis_code_3
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: diagnosis_code_3
            description: Third diagnosis code for the line
            dimension:
              is_time: false

          - name: diagnosis_code_4
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: diagnosis_code_4
            description: Fourth diagnosis code for the line
            dimension:
              is_time: false

          - name: service_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: service_date
            description: Date of service for the line item
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "line date of service"
                - "DOS"

          - name: place_of_service_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: place_of_service_code
            description: Place of service for the line
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "POS"
                - "line POS"

          - name: units
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: units
            description: Number of service units
            ai_context:
              synonyms:
                - "quantity"
                - "service units"
                - "unit count"

          - name: line_billed_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_billed_amount
            description: Billed amount for the line
            ai_context:
              synonyms:
                - "line charges"
                - "submitted amount"

          - name: line_allowed_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_allowed_amount
            description: Allowed amount for the line
            ai_context:
              synonyms:
                - "line allowable"
                - "contracted amount"

          - name: line_paid_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_paid_amount
            description: Paid amount for the line
            ai_context:
              synonyms:
                - "line payment"
                - "line reimbursement"

          - name: line_copay_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_copay_amount
            description: Copay amount for the line
            ai_context:
              synonyms:
                - "line copay"

          - name: line_coinsurance_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_coinsurance_amount
            description: Coinsurance amount for the line
            ai_context:
              synonyms:
                - "line coinsurance"

          - name: line_deductible_amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_deductible_amount
            description: Deductible amount for the line
            ai_context:
              synonyms:
                - "line deductible"

          - name: denial_reason_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: denial_reason_code
            description: Reason code if line was denied
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "denial code"
                - "reject reason"
                - "CARC"
                - "RARC"

          - name: ndc_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ndc_code
            description: National Drug Code for drug-related services
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "NDC"
                - "drug code"
                - "national drug code"

      # ====================
      # DIMENSION TABLE: Member Demographics
      # ====================
      - name: member_demographics
        source: claims_db.reference.member_dim
        primary_key: [member_id]
        unique_keys:
          - [member_id]
          - [subscriber_id, dependent_sequence]
        description: Dimension table containing member demographic information, enrollment, and plan details
        ai_context:
          synonyms:
            - "members"
            - "patients"
            - "enrollees"
            - "subscribers"
            - "beneficiaries"

        fields:
          - name: member_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: member_id
            description: Unique identifier for the member
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "patient ID"
                - "enrollee ID"

          - name: subscriber_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: subscriber_id
            description: Policy holder/subscriber identifier
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "policy holder"
                - "contract holder"

          - name: dependent_sequence
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dependent_sequence
            description: Sequence number for dependents under subscriber
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "dependent number"
                - "family sequence"

          - name: first_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: first_name
            description: Member first name
            dimension:
              is_time: false

          - name: last_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: last_name
            description: Member last name
            dimension:
              is_time: false

          - name: member_full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: first_name || ' ' || last_name
            description: Member full name (computed)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "patient name"
                - "member name"

          - name: date_of_birth
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: date_of_birth
            description: Member date of birth
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "DOB"
                - "birth date"

          - name: age
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: FLOOR(DATEDIFF(year, date_of_birth, CURRENT_DATE))
                - dialect: SNOWFLAKE
                  expression: DATEDIFF('year', date_of_birth, CURRENT_DATE())
            description: Member current age in years
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "member age"
                - "patient age"

          - name: age_band
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: |
                    CASE 
                      WHEN DATEDIFF(year, date_of_birth, CURRENT_DATE) < 18 THEN '0-17'
                      WHEN DATEDIFF(year, date_of_birth, CURRENT_DATE) < 35 THEN '18-34'
                      WHEN DATEDIFF(year, date_of_birth, CURRENT_DATE) < 50 THEN '35-49'
                      WHEN DATEDIFF(year, date_of_birth, CURRENT_DATE) < 65 THEN '50-64'
                      ELSE '65+'
                    END
                - dialect: SNOWFLAKE
                  expression: |
                    CASE 
                      WHEN DATEDIFF('year', date_of_birth, CURRENT_DATE()) < 18 THEN '0-17'
                      WHEN DATEDIFF('year', date_of_birth, CURRENT_DATE()) < 35 THEN '18-34'
                      WHEN DATEDIFF('year', date_of_birth, CURRENT_DATE()) < 50 THEN '35-49'
                      WHEN DATEDIFF('year', date_of_birth, CURRENT_DATE()) < 65 THEN '50-64'
                      ELSE '65+'
                    END
            description: Member age group/band
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "age group"
                - "age range"
                - "age category"

          - name: gender_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: gender_code
            description: Member gender (M/F/U)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "sex"
                - "gender"

          - name: gender_description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: |
                    CASE gender_code 
                      WHEN 'M' THEN 'Male' 
                      WHEN 'F' THEN 'Female' 
                      ELSE 'Unknown' 
                    END
            description: Gender description
            dimension:
              is_time: false

          - name: address_line_1
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: address_line_1
            description: Member street address
            dimension:
              is_time: false

          - name: city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: city
            description: Member city
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "member city"
                - "residence city"

          - name: state_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: state_code
            description: Member state code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "state"
                - "member state"

          - name: zip_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: zip_code
            description: Member ZIP code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "postal code"
                - "ZIP"

          - name: zip_3
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: SUBSTRING(zip_code, 1, 3)
                - dialect: SNOWFLAKE
                  expression: SUBSTR(zip_code, 1, 3)
            description: First 3 digits of ZIP code for regional analysis
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "ZIP3"
                - "regional ZIP"

          - name: county_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: county_code
            description: FIPS county code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "county"
                - "FIPS code"

          - name: relationship_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: relationship_code
            description: Relationship to subscriber (Self/Spouse/Child/Other)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "relationship"
                - "dependent type"

          - name: plan_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: plan_id
            description: Health plan identifier
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "plan"
                - "benefit plan"

          - name: product_type
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: product_type
            description: Product type (HMO/PPO/EPO/POS/HDHP)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "plan type"
                - "product"

          - name: line_of_business
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: line_of_business
            description: Line of business (Commercial/Medicare/Medicaid)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "LOB"
                - "business segment"
                - "market segment"

          - name: employer_group_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: employer_group_id
            description: Employer group identifier
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "group"
                - "employer"
                - "account"

          - name: effective_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: effective_date
            description: Coverage effective date
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "enrollment date"
                - "coverage start"

          - name: termination_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: termination_date
            description: Coverage termination date
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "term date"
                - "coverage end"
                - "disenrollment date"

          - name: is_active
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: CASE WHEN termination_date IS NULL OR termination_date > CURRENT_DATE THEN 1 ELSE 0 END
                - dialect: SNOWFLAKE
                  expression: CASE WHEN termination_date IS NULL OR termination_date > CURRENT_DATE() THEN 1 ELSE 0 END
            description: Flag indicating if member is currently enrolled
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "active"
                - "currently enrolled"

      # ====================
      # DIMENSION TABLE: ICD-10 Diagnosis Codes
      # ====================
      - name: icd10_diagnosis
        source: claims_db.reference.icd10_diagnosis_dim
        primary_key: [diagnosis_code]
        unique_keys:
          - [diagnosis_code]
        description: ICD-10-CM diagnosis code reference dimension with code descriptions and hierarchical groupings
        ai_context:
          synonyms:
            - "diagnosis codes"
            - "ICD codes"
            - "ICD-10"
            - "dx codes"
            - "condition codes"

        fields:
          - name: diagnosis_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: diagnosis_code
            description: ICD-10-CM diagnosis code
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "ICD code"
                - "dx code"
                - "diagnosis"

          - name: diagnosis_code_formatted
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: |
                    CASE 
                      WHEN LENGTH(diagnosis_code) > 3 
                      THEN SUBSTRING(diagnosis_code, 1, 3) || '.' || SUBSTRING(diagnosis_code, 4)
                      ELSE diagnosis_code 
                    END
                - dialect: SNOWFLAKE
                  expression: |
                    CASE 
                      WHEN LENGTH(diagnosis_code) > 3 
                      THEN SUBSTR(diagnosis_code, 1, 3) || '.' || SUBSTR(diagnosis_code, 4)
                      ELSE diagnosis_code 
                    END
            description: ICD-10 code with decimal formatting
            dimension:
              is_time: false

          - name: short_description
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: short_description
            description: Short description of the diagnosis
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "diagnosis name"
                - "condition"

          - name: long_description
