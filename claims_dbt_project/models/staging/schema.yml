version: 2

models:
  - name: stg_claims_header
    description: Staged claims header data with proper data types
    columns:
      - name: claim_id
        description: Unique claim identifier
        tests:
          - unique
          - not_null

  - name: stg_claims_lines
    description: Staged claims line items with proper data types
    columns:
      - name: line_id
        description: Unique line item identifier
        tests:
          - unique
          - not_null
      - name: claim_id
        description: Foreign key to claims header
        tests:
          - not_null
